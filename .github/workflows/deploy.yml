name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: bsec-lifecycle/package-lock.json

      - name: Build bsec-lifecycle
        working-directory: bsec-lifecycle
        run: |
          npm ci
          npm run build

      - name: Assemble site
        run: |
          mkdir -p dist/bsec-lifecycle
          cp index.html dist/
          cp -r bsec-lifecycle/dist/* dist/bsec-lifecycle/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
